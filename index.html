<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JR Burguer — Cardápio</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== HERO / CAPA ===== -->
  <section class="hero">
    <img id="bannerImage" class="hero__bg" alt="Banner JR Burguer" />
    <div class="hero__overlay"></div>
    <div class="hero__profile">
      <img id="profileLogo" class="hero__logo" alt="Logo JR Burguer" />
    </div>
  </section>

  <!-- ===== APP SHELL ===== -->
  <main class="app">

    <!-- CATEGORIAS -->
    <nav class="cats" aria-label="Categorias">
      <button class="cat-btn active" data-category="burgers">
        <img src="categorias%20hamburgueres.png" alt="" />
        <span>Lanches</span>
      </button>
      <button class="cat-btn" data-category="drinks">
        <img src="categoria%20bebidas.png" alt="" />
        <span>Bebidas</span>
      </button>
      <button class="cat-btn" data-category="desserts">
        <img src="categoria%20sobremesa.png" alt="" />
        <span>Sobremesas</span>
      </button>
    </nav>

    <!-- SEÇÃO HAMBÚRGUERES -->
    <section id="burgersSection" class="menu-section">
      <h2 class="section-title">
        <span class="section-title__line"></span>
        Lanches
        <span class="section-title__line"></span>
      </h2>
      <div class="grid" id="burgersGrid"></div>
    </section>

    <!-- SEÇÃO BEBIDAS -->
    <section id="drinksSection" class="menu-section is-hidden">
      <h2 class="section-title">
        <span class="section-title__line"></span>
        Bebidas
        <span class="section-title__line"></span>
      </h2>
      <div class="drinks-list" id="drinksGrid"></div>
    </section>

    <!-- SEÇÃO SOBREMESAS -->
    <section id="dessertsSection" class="menu-section is-hidden">
      <h2 class="section-title">
        <span class="section-title__line"></span>
        Sobremesas
        <span class="section-title__line"></span>
      </h2>
      <div class="desserts-list" id="dessertsGrid"></div>
    </section>

  </main>

  <!-- ===== MODAL DO PRODUTO ===== -->
  <div class="modal-overlay" id="productModal" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>

    <article class="modal">
      <!-- Handle de arraste -->
      <div class="modal__handle"></div>

      <!-- Fechar -->
      <button class="modal__close" id="modalClose" aria-label="Fechar">✕</button>

      <!-- Categoria (topo) -->
      <p class="modal__category" id="modalCategory"></p>

      <!-- Nome do produto -->
      <h3 class="modal__name" id="modalName"></h3>

      <!-- Scroll de produtos (carrossel) -->
      <div class="modal__carousel" id="modalCarousel">
        <!-- itens injetados via JS -->
      </div>
      <!-- Dots indicadores -->
      <div class="modal__dots" id="modalDots"></div>

      <!-- Preço -->
      <p class="modal__price" id="modalPrice"></p>

      <!-- Adicionais (hambúrgueres) -->
      <div class="modal__extras is-hidden" id="modalExtras">
        <p class="modal__extras-title">Adicionais</p>
        <div class="modal__extras-list" id="modalExtrasList"></div>
      </div>

      <!-- Controle de quantidade -->
      <div class="modal__qty-row">
        <button class="modal__qty-btn" id="modalQtyMinus">−</button>
        <span class="modal__qty-val" id="modalQtyVal">1</span>
        <button class="modal__qty-btn" id="modalQtyPlus">+</button>
      </div>

      <!-- Botão adicionar -->
      <button class="modal__add-btn" id="modalAdd">
        <span id="modalAddLabel">Adicionar ao pedido</span>
        <span class="modal__add-total" id="modalAddTotal"></span>
      </button>
    </article>
  </div>

  <!-- ===== FAB CARRINHO ===== -->
  <button class="fab" id="cartFab" aria-label="Abrir carrinho">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span class="fab__badge" id="cartBadge">0</span>
  </button>

  <!-- ===== PAINEL CARRINHO ===== -->
  <div class="cart-overlay" id="cartOverlay">
    <aside class="cart-panel">
      <div class="cart-panel__header">
        <div>
          <h4>Seu Pedido</h4>
          <p class="cart-panel__sub" id="cartItemCount">0 itens</p>
        </div>
        <button class="cart-panel__close" id="cartClose">✕</button>
      </div>

      <ul class="cart-list" id="cartList"></ul>

      <div class="cart-empty" id="cartEmpty">
        <span>🛒</span>
        <p>Seu carrinho está vazio</p>
        <small>Adicione itens do cardápio</small>
      </div>

      <div class="cart-panel__footer" id="cartFooter">
        <div class="cart-panel__total-row">
          <span>Subtotal</span>
          <strong id="cartTotal">R$ 0,00</strong>
        </div>
        <div class="cart-delivery-notice">
          🛵 Taxa de entrega a combinar com o atendente
        </div>
        <button class="btn-whatsapp" id="cartCheckout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.554 4.12 1.524 5.855L0 24l6.335-1.502A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.006-1.37l-.36-.214-3.727.883.939-3.619-.235-.372A9.818 9.818 0 1 1 12 21.818z"/></svg>
          Finalizar no WhatsApp
        </button>
      </div>
    </aside>
  </div>

  <!-- ===== MODAL DE ENDEREÇO ===== -->
  <div class="addr-overlay" id="addrOverlay">
    <div class="addr-modal">
      <h3 class="addr-modal__title">📍 Endereço de Entrega</h3>
      <p class="addr-modal__sub">Informe seu endereço para finalizarmos o pedido</p>

      <div class="addr-field">
        <label for="addrName">Seu nome</label>
        <input type="text" id="addrName" placeholder="Ex: João Silva" autocomplete="name" />
      </div>
      <div class="addr-field">
        <label for="addrStreet">Rua e número</label>
        <input type="text" id="addrStreet" placeholder="Ex: Rua das Flores, 123" autocomplete="street-address" />
      </div>
      <div class="addr-field">
        <label for="addrNeighborhood">Bairro</label>
        <input type="text" id="addrNeighborhood" placeholder="Ex: Centro" />
      </div>
      <div class="addr-field">
        <label for="addrPayment">Forma de pagamento</label>
        <select id="addrPayment">
          <option value="">Selecione</option>
          <option value="pix">Pix</option>
          <option value="dinheiro">Dinheiro</option>
          <option value="cartao">Cartão</option>
        </select>
      </div>
      <div class="addr-field is-hidden" id="addrCashChangeField">
        <label for="addrCashChange">Troco para quanto? <span>(opcional)</span></label>
        <input type="text" id="addrCashChange" placeholder="Ex: 50,00" />
      </div>
      <div class="addr-field">
        <label for="addrRef">Ponto de referência <span>(opcional)</span></label>
        <input type="text" id="addrRef" placeholder="Ex: Próximo ao mercado X" />
      </div>

      <div class="addr-modal__actions">
        <button class="addr-btn addr-btn--cancel" id="addrCancel">Cancelar</button>
        <button class="addr-btn addr-btn--confirm" id="addrConfirm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.554 4.12 1.524 5.855L0 24l6.335-1.502A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.006-1.37l-.36-.214-3.727.883.939-3.619-.235-.372A9.818 9.818 0 1 1 12 21.818z"/></svg>
          Enviar no WhatsApp
        </button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
